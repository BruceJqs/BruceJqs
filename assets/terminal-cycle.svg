<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .mono {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    .cmd {
      fill: #7FFFD4;
      font-size: 22px;
    }

    .out {
      fill: #C9D1D9;
      font-size: 22px;
    }

    #ssh-group {
      animation: show-ssh 24s linear infinite;
    }

    #profile-group {
      animation: show-profile 24s linear infinite;
    }

    #focus-group {
      animation: show-focus 24s linear infinite;
    }

    #ssh1-clip {
      animation: ssh1 24s steps(18, end) infinite;
    }

    #ssh2-clip {
      animation: ssh2 24s steps(24, end) infinite;
    }

    #profile1-clip {
      animation: profile1 24s steps(18, end) infinite;
    }

    #profile2-clip {
      animation: profile2 24s steps(28, end) infinite;
    }

    #profile3-clip {
      animation: profile3 24s steps(47, end) infinite;
    }

    #profile4-clip {
      animation: profile4 24s steps(56, end) infinite;
    }

    #focus1-clip {
      animation: focus1 24s steps(12, end) infinite;
    }

    #focus2-clip {
      animation: focus2 24s steps(54, end) infinite;
    }

    @keyframes show-ssh {
      0%, 22% { opacity: 1; }
      24%, 100% { opacity: 0; }
    }

    @keyframes show-profile {
      0%, 26% { opacity: 0; }
      28%, 70% { opacity: 1; }
      72%, 100% { opacity: 0; }
    }

    @keyframes show-focus {
      0%, 74% { opacity: 0; }
      76%, 96% { opacity: 1; }
      98%, 100% { opacity: 0; }
    }

    @keyframes ssh1 {
      0%, 2% { width: 0px; }
      10%, 22% { width: 930px; }
      24%, 100% { width: 0px; }
    }

    @keyframes ssh2 {
      0%, 10% { width: 0px; }
      18%, 22% { width: 930px; }
      24%, 100% { width: 0px; }
    }

    @keyframes profile1 {
      0%, 28% { width: 0px; }
      36%, 70% { width: 930px; }
      72%, 100% { width: 0px; }
    }

    @keyframes profile2 {
      0%, 38% { width: 0px; }
      46%, 70% { width: 930px; }
      72%, 100% { width: 0px; }
    }

    @keyframes profile3 {
      0%, 48% { width: 0px; }
      56%, 70% { width: 930px; }
      72%, 100% { width: 0px; }
    }

    @keyframes profile4 {
      0%, 58% { width: 0px; }
      66%, 70% { width: 930px; }
      72%, 100% { width: 0px; }
    }

    @keyframes focus1 {
      0%, 76% { width: 0px; }
      84%, 96% { width: 930px; }
      98%, 100% { width: 0px; }
    }

    @keyframes focus2 {
      0%, 86% { width: 0px; }
      94%, 96% { width: 930px; }
      98%, 100% { width: 0px; }
    }
  </style>

  <rect width="1000" height="300" rx="16" fill="#0D1117"/>
  <rect x="1" y="1" width="998" height="298" rx="15" stroke="#1F2937" stroke-width="2"/>

  <rect width="1000" height="42" rx="16" fill="#111827"/>
  <rect y="26" width="1000" height="16" fill="#111827"/>
  <rect x="0" y="42" width="1000" height="258" fill="#0D1117"/>

  <circle cx="28" cy="21" r="7" fill="#FF5F56"/>
  <circle cx="52" cy="21" r="7" fill="#FFBD2E"/>
  <circle cx="76" cy="21" r="7" fill="#27C93F"/>

  <text x="500" y="26" text-anchor="middle" fill="#9CA3AF" class="mono" font-size="16">terminal://bruce@github/session</text>

  <defs>
    <clipPath id="ssh1-path">
      <rect id="ssh1-clip" x="34" y="60" width="0" height="28"/>
    </clipPath>
    <clipPath id="ssh2-path">
      <rect id="ssh2-clip" x="34" y="98" width="0" height="28"/>
    </clipPath>

    <clipPath id="profile1-path">
      <rect id="profile1-clip" x="34" y="60" width="0" height="28"/>
    </clipPath>
    <clipPath id="profile2-path">
      <rect id="profile2-clip" x="34" y="98" width="0" height="28"/>
    </clipPath>
    <clipPath id="profile3-path">
      <rect id="profile3-clip" x="34" y="136" width="0" height="28"/>
    </clipPath>
    <clipPath id="profile4-path">
      <rect id="profile4-clip" x="34" y="174" width="0" height="28"/>
    </clipPath>

    <clipPath id="focus1-path">
      <rect id="focus1-clip" x="34" y="60" width="0" height="28"/>
    </clipPath>
    <clipPath id="focus2-path">
      <rect id="focus2-clip" x="34" y="98" width="0" height="28"/>
    </clipPath>
  </defs>

  <g id="ssh-group">
    <rect x="24" y="54" width="952" height="210" rx="8" fill="#0D1117"/>
    <text x="34" y="84" class="mono cmd" clip-path="url(#ssh1-path)">$ ssh bruce@github</text>
    <text x="34" y="122" class="mono out" clip-path="url(#ssh2-path)">Authenticated as BruceJqs</text>
  </g>

  <g id="profile-group">
    <rect x="24" y="54" width="952" height="210" rx="8" fill="#0D1117"/>
    <text x="34" y="84" class="mono cmd" clip-path="url(#profile1-path)">$ cat profile.txt</text>
    <text x="34" y="122" class="mono out" clip-path="url(#profile2-path)">ZJU '23 CS | ACEE | ZJUCSA</text>
    <text x="34" y="160" class="mono out" clip-path="url(#profile3-path)">Beginner CTF player and long-term security learner</text>
    <text x="34" y="198" class="mono out" clip-path="url(#profile4-path)">Public notebook builder for courses, labs, and research</text>
  </g>

  <g id="focus-group">
    <rect x="24" y="54" width="952" height="210" rx="8" fill="#0D1117"/>
    <text x="34" y="84" class="mono cmd" clip-path="url(#focus1-path)">$ ls focus/</text>
    <text x="34" y="122" class="mono out" clip-path="url(#focus2-path)">coursework  ctf  security-research  systems  notes</text>
  </g>
</svg>
